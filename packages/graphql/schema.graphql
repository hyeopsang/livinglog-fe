type Query {
  user(id: ID!): User
  users: [User!]!
  bestsellers: [Product!]!
  categories: [Category!]!
  products(filter: ProductFilter): ProductConnection!
  product(id: ID!): Product
  myOrders: [Order!]!
  order(id: ID!): Order
}

input ProductFilter {
  categoryId: ID
  query: String
  sort: ProductSort
  minPrice: Int
  maxPrice: Int
  page: Int
  limit: Int
}

enum ProductSort {
  POPULAR
  NEWEST
  PRICE_ASC
  PRICE_DESC
  RATING
}

type ProductConnection {
  items: [Product!]!
  total: Int!
  hasMore: Boolean!
}


type Mutation {
  login(input: LoginInput!): AuthPayload!
  logout: Boolean!
  cancelOrder(id: ID!): Order!
}

type Subscription {
  userUpdated(id: ID!): User!
}

type User {
  id: ID!
  name: String!
  email: String!
  role: UserRole!
  createdAt: String!
  updatedAt: String!
}

type AuthPayload {
  accessToken: String!
  user: User!
}

input LoginInput {
  email: String!
  password: String!
}

enum UserRole {
  ADMIN
  USER
}

enum OrderStatus {
  PENDING
  CONFIRMED
  SHIPPING
  DELIVERED
  CANCELLED
}

type OrderItem {
  id: ID!
  product: Product!
  quantity: Int!
  price: Int!
}

type Order {
  id: ID!
  orderNumber: String!
  status: OrderStatus!
  items: [OrderItem!]!
  totalPrice: Int!
  orderedAt: String!
  updatedAt: String!
}

enum Badge {
  FREE_SHIPPING
  SPECIAL
  SHIPPING_FEE
}

type ProductSpec {
  label: String!
  value: String!
}

type Product {
  id: ID!
  brand: String!
  name: String!
  originalPrice: Int!
  discountRate: Int!
  rating: Float!
  reviewCount: Int!
  badges: [Badge!]!
  imageUrl: String!
  href: String!
  categorySlug: String!
  description: String
  images: [String!]!
  specifications: [ProductSpec!]!
}

type Category {
  id: ID!
  label: String!
  imageUrl: String!
  href: String!
}
