type Query {
  user(id: ID!): User
  users: [User!]!
}

type Mutation {
  login(input: LoginInput!): AuthPayload!
  logout: Boolean!
}

type Subscription {
  userUpdated(id: ID!): User!
}

type User {
  id: ID!
  name: String!
  email: String!
  role: UserRole!
  createdAt: String!
  updatedAt: String!
}

type AuthPayload {
  accessToken: String!
  user: User!
}

input LoginInput {
  email: String!
  password: String!
}

enum UserRole {
  ADMIN
  USER
}
