type Query {
  user(id: ID!): User
  users: [User!]!
  bestsellers: [Product!]!
  categories: [Category!]!
}


type Mutation {
  login(input: LoginInput!): AuthPayload!
  logout: Boolean!
}

type Subscription {
  userUpdated(id: ID!): User!
}

type User {
  id: ID!
  name: String!
  email: String!
  role: UserRole!
  createdAt: String!
  updatedAt: String!
}

type AuthPayload {
  accessToken: String!
  user: User!
}

input LoginInput {
  email: String!
  password: String!
}

enum UserRole {
  ADMIN
  USER
}

enum Badge {
  FREE_SHIPPING
  SPECIAL
  SHIPPING_FEE
}

type Product {
  id: ID!
  brand: String!
  name: String!
  originalPrice: Int!
  discountRate: Int!
  rating: Float!
  reviewCount: Int!
  badges: [Badge!]!
  imageUrl: String!
  href: String!
}

type Category {
  id: ID!
  label: String!
  imageUrl: String!
  href: String!
}
