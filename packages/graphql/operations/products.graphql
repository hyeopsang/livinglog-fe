query GetBestsellers {
  bestsellers {
    id
    brand
    name
    originalPrice
    discountRate
    rating
    reviewCount
    badges
    imageUrl
    href
  }
}

query GetCategories {
  categories {
    id
    label
    imageUrl
    href
  }
}

query GetProducts($filter: ProductFilter) {
  products(filter: $filter) {
    items {
      id
      brand
      name
      originalPrice
      discountRate
      rating
      reviewCount
      badges
      imageUrl
      href
      categorySlug
    }
    total
    hasMore
  }
}
