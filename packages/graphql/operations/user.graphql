query GetUser($id: ID!) {
  user(id: $id) {
    id
    name
    email
    role
    createdAt
    updatedAt
  }
}

query GetUsers {
  users {
    id
    name
    email
    role
    createdAt
  }
}

subscription OnUserUpdated($id: ID!) {
  userUpdated(id: $id) {
    id
    name
    email
    role
    updatedAt
  }
}
